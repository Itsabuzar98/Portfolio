name = "abuzar-portfolio"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Static frontend (public/) served by Workers Assets.
# run_worker_first lets the Worker stamp security headers + handle /api and /media.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# --- KV: site content + auth + sessions + rate limits ---
# Create with:  npx wrangler kv namespace create CONTENT_KV
# then paste the generated id below.
[[kv_namespaces]]
binding = "CONTENT_KV"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# --- R2: uploaded media (certificates, photos, resume PDFs) ---
# Create with:  npx wrangler r2 bucket create abuzar-portfolio-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "abuzar-portfolio-media"
